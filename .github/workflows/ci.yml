name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Build with Maven
        run: mvn clean compile
      
      - name: Run tests (w build)
        run: mvn test
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jar-file
          path: target/*.jar
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    needs: build
    if: always()  # ← WAŻNE: uruchamia się nawet jeśli build miał warningi
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: jar-file
          path: target/
          
      - name: Verify JAR exists
        run: ls -la target/   # ← diagnostyczne: sprawdza czy plik jest
          
      - name: Run tests with JAR
        run: mvn test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: success()  # ← uruchamia się tylko jeśli testy przeszły
    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: jar-file
          path: target/
      
      - name: Deploy to test environment
        run: |
          echo "Deploying to test environment..."
          echo "JAR file: $(ls target/*.jar)"
