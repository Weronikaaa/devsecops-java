name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Build and package JAR
        run: mvn clean package -DskipTests   # ← KLUCZOWA ZMIANA: package, nie compile
      
      - name: List target directory
        run: ls -la target/                   # ← DIAGNOSTYKA: pokazuje, czy JAR powstał
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jar-file
          path: target/*.jar
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: jar-file
          path: target/
          
      - name: Verify JAR exists
        run: ls -la target/                   # ← DIAGNOSTYKA: czy pobrało?
      
      - name: Run tests
        run: mvn test                         # ← testy korzystają z kodu, nie z JAR-a
        # Uwaga: to uruchomi testy ponownie (co jest OK), ale nie zależy od JAR-a

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: jar-file
          path: target/
      
      - name: Deploy to test environment
        run: |
          echo "Deploying with JAR: $(ls target/*.jar)"
